# LEGACY/DEMO STACK ONLY.
# Do not use this file for production deployment.
# Use the root docker-compose.yml in the project root folder instead.
version: "3.9"

networks:
  raft-net:
    driver: bridge

services:
  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    environment:
      - REPLICA_URLS=http://replica1:4001,http://replica2:4002,http://replica3:4003
    networks:
      - raft-net
    depends_on:
      - replica1
      - replica2
      - replica3

  replica1:
    build: ./replica1
    volumes:
      - ./replica1:/app        # bind mount for hot reload
    environment:
      - REPLICA_ID=replica1
      - PORT=4001
      - PEERS=http://replica2:4002,http://replica3:4003
    ports:
      - "4001:4001"
    networks:
      - raft-net

  replica2:
    build: ./replica2
    volumes:
      - ./replica2:/app
    environment:
      - REPLICA_ID=replica2
      - PORT=4002
      - PEERS=http://replica1:4001,http://replica3:4003
    ports:
      - "4002:4002"
    networks:
      - raft-net

  replica3:
    build: ./replica3
    volumes:
      - ./replica3:/app
    environment:
      - REPLICA_ID=replica3
      - PORT=4003
      - PEERS=http://replica1:4001,http://replica2:4002
    ports:
      - "4003:4003"
    networks:
      - raft-net

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    networks:
      - raft-net