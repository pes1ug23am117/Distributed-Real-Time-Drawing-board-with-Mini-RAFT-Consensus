
services:
  gateway:
    build: ./gateway
    container_name: gateway
    environment:
      - IS_DOCKER=true
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=8080
      - REPLICA1_URL=http://replica1:3001
      - REPLICA2_URL=http://replica2:3002
      - REPLICA3_URL=http://replica3:3003
    ports:
      - "8080:8080"
    depends_on:
      - replica1
      - replica2
      - replica3
    restart: unless-stopped
    networks:
      - raftnet

  frontend:
    build: ./frontend/frontend
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - gateway
    restart: unless-stopped
    networks:
      - raftnet

  replica1:
    build:
      context: .
      dockerfile: ./replica1/Dockerfile
    container_name: replica1
    environment:
      - NODE_ID=replica1
      - PORT=3001
      - IS_DOCKER=true
      - GATEWAY_URL=http://gateway:8080
    ports:
      - "3001:3001"
    restart: unless-stopped
    networks:
      - raftnet

  replica2:
    build:
      context: .
      dockerfile: ./replica2/Dockerfile
    container_name: replica2
    environment:
      - NODE_ID=replica2
      - PORT=3002
      - IS_DOCKER=true
      - GATEWAY_URL=http://gateway:8080
    ports:
      - "3002:3002"
    restart: unless-stopped
    networks:
      - raftnet

  replica3:
    build:
      context: .
      dockerfile: ./replica3/Dockerfile
    container_name: replica3
    environment:
      - NODE_ID=replica3
      - PORT=3003
      - IS_DOCKER=true
      - GATEWAY_URL=http://gateway:8080
    ports:
      - "3003:3003"
    restart: unless-stopped
    networks:
      - raftnet

networks:
  raftnet:
    driver: bridge